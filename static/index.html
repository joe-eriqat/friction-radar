<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Friction Radar — onboarding intelligence</title>
<style>
  :root {
    --bg: #0f1115;
    --panel: #171a21;
    --panel-2: #1f232c;
    --line: #2a2f3a;
    --text: #e7eaf0;
    --muted: #9aa3b2;
    --accent: #5b8cff;
    --success: #3fb27f;
    --failure: #e0683f;
    --churn: #c0476a;
    --high: #e0683f;
    --medium: #d9a441;
    --low: #6b7280;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--text);
    font: 15px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }
  header {
    padding: 22px 28px; border-bottom: 1px solid var(--line);
    display: flex; align-items: baseline; gap: 14px;
  }
  header h1 { margin: 0; font-size: 20px; letter-spacing: -0.2px; }
  header .tag { color: var(--muted); font-size: 13px; }
  main { max-width: 1040px; margin: 0 auto; padding: 24px 28px 80px; }
  .card { background: var(--panel); border: 1px solid var(--line); border-radius: 12px; padding: 18px; }
  label { display: block; font-size: 13px; color: var(--muted); margin: 0 0 6px; }
  input[type=text], textarea {
    width: 100%; background: var(--panel-2); color: var(--text);
    border: 1px solid var(--line); border-radius: 8px; padding: 10px 12px; font: inherit;
  }
  textarea { resize: vertical; min-height: 180px; }
  .row { display: flex; gap: 12px; align-items: center; margin-top: 14px; flex-wrap: wrap; }
  button, .btn-link {
    background: var(--accent); color: #fff; border: 0; border-radius: 8px;
    padding: 10px 16px; font: inherit; font-weight: 600; cursor: pointer;
    text-decoration: none; display: inline-block;
  }
  button.ghost, .btn-link.ghost { background: transparent; color: var(--text); border: 1px solid var(--line); }
  select.ghost { background: transparent; color: var(--text); border: 1px solid var(--line);
    border-radius: 8px; padding: 10px 16px; font: inherit; font-weight: 600; cursor: pointer; }
  button:disabled { opacity: .55; cursor: default; }
  .hint { color: var(--muted); font-size: 13px; }
  .grid { display: grid; gap: 14px; margin-top: 18px; }
  .summary { border-left: 3px solid var(--accent); }
  .theme { border-left: 3px solid var(--line); }
  .theme.success { border-left-color: var(--success); }
  .theme.failure { border-left-color: var(--failure); }
  .theme.churn   { border-left-color: var(--churn); }
  .theme h3 { margin: 0 0 8px; font-size: 16px; }
  .badges { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; }
  .badge {
    font-size: 11px; text-transform: uppercase; letter-spacing: .4px;
    padding: 3px 8px; border-radius: 999px; border: 1px solid var(--line); color: var(--muted);
  }
  .badge.success { color: var(--success); border-color: var(--success); }
  .badge.failure { color: var(--failure); border-color: var(--failure); }
  .badge.churn   { color: var(--churn); border-color: var(--churn); }
  .badge.sev-high { color: var(--high); border-color: var(--high); }
  .badge.sev-medium { color: var(--medium); border-color: var(--medium); }
  .badge.sev-low { color: var(--low); border-color: var(--low); }
  .evidence { margin: 8px 0; padding-left: 14px; border-left: 2px solid var(--line); list-style: none; }
  .evidence li { color: var(--muted); margin: 6px 0; }
  .evidence .quote { font-style: italic; }
  .evidence .cite { font-style: normal; font-size: 12px; color: var(--muted); opacity: .8; }
  .evidence .cite a { color: var(--accent); }
  .rec { margin-top: 10px; }
  .rec b { color: var(--accent); }
  table { width: 100%; border-collapse: collapse; margin-top: 6px; font-size: 13.5px; }
  th, td { text-align: left; padding: 8px 10px; border-bottom: 1px solid var(--line); vertical-align: top; }
  th { color: var(--muted); font-weight: 600; }
  tr.histrow { cursor: pointer; }
  tr.histrow:hover td { background: var(--panel-2); }
  .error { color: var(--failure); }
  .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid var(--line);
    border-top-color: var(--accent); border-radius: 50%; animation: spin .8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .sectiontitle { margin: 26px 0 10px; font-size: 14px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; }
</style>
</head>
<body>
<header>
  <h1>Friction Radar</h1>
  <span class="tag">onboarding intelligence from public sentiment</span>
</header>

<main>
  <div class="card">
    <label for="product">Product, competitor, or category</label>
    <input id="product" type="text" placeholder="e.g. AI meeting-notes app" />
    <label for="feedback" style="margin-top:14px">Feedback — paste anything (CSV, JSON, or a messy export with headers, separator bars, and multi-line comments)</label>
    <textarea id="feedback" placeholder="Paste reviews, Reddit threads, app-store exports… any format. We'll parse it into individual comments before analyzing."></textarea>
    <div class="row">
      <button id="analyze">Analyze onboarding</button>
      <select id="demo" class="ghost" title="Load a sample dataset">
        <option value="">Load a sample…</option>
      </select>
      <label id="uploadlabel" class="btn-link ghost" for="file" style="cursor:pointer">Upload a file…</label>
      <input id="file" type="file" accept=".csv,.json,.txt,.tsv,.md" style="display:none" />
      <label id="demomodewrap" class="hint" style="display:none; cursor:pointer" title="Replay a real saved run — no API key, no tokens, instant">
        <input id="demomode" type="checkbox" /> ⚡ Demo mode
      </label>
      <span id="status" class="hint"></span>
    </div>
  </div>

  <div id="report"></div>
  <div id="history"></div>
</main>

<script>
const $ = (id) => document.getElementById(id);
const esc = (s) => String(s).replace(/[&<>"']/g, c => (
  {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

function setStatus(msg, busy = false) {
  $("status").innerHTML = busy ? `<span class="spinner"></span> ${esc(msg)}` : esc(msg);
}

// Static build (GitHub Pages) sets this — there's no backend, so demo mode is the only path.
const STATIC = !!window.FRICTION_RADAR_STATIC;
const DEMO_BASE = "demos";   // served by FastAPI in dev, a copied dir in the static build
let demoMode = STATIC;       // replay canned output instead of calling the model
let selectedDemo = "";       // id of the demo currently loaded into the inputs
let lastView = null;         // last rendered ReportView, for client-side export

async function loadDemos() {
  try {
    const r = await fetch(`${DEMO_BASE}/index.json`);
    if (!r.ok) return;
    const demos = await r.json();
    if (!demos.length) return;
    $("demo").innerHTML = `<option value="">Load a sample…</option>` +
      demos.map(d => `<option value="${esc(d.id)}">${esc(d.name)}${d.count ? ` (${d.count})` : ""}</option>`).join("");
  } catch { /* picker is non-critical */ }
}

async function loadSample(id) {
  selectedDemo = id || "";
  if (!id) return;
  setStatus("Loading sample…", true);
  try {
    const r = await fetch(`${DEMO_BASE}/${encodeURIComponent(id)}.json`);
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const data = await r.json();
    $("product").value = data.product;
    // feedback items are objects ({text, source, ...}); blank-line separated so multi-line
    // comments survive re-parsing on Analyze.
    $("feedback").value = (data.feedback || []).map(f => f.text).join("\n\n");
    const n = (data.feedback || []).length;
    setStatus(demoMode
      ? `Loaded “${esc(data.name || id)}” (${n} comments) — click ${esc($("analyze").textContent)} to replay.`
      : `Loaded sample (${n} comments) — click Analyze.`);
  } catch (e) {
    setStatus("Couldn't load sample: " + e.message);
  }
}

// Demo mode: render a real, pre-captured run for the selected demo — no model call.
async function replayDemo(id) {
  setStatus("Loading saved run…", true);
  try {
    const r = await fetch(`${DEMO_BASE}/canned/${encodeURIComponent(id)}.json`);
    if (r.status === 404) throw new Error("No saved run exists for this demo yet.");
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    render(await r.json(), id);
    setStatus("Replayed saved run (no API call).");
    window.scrollTo({ top: 0, behavior: "smooth" });
  } catch (e) {
    $("report").innerHTML = `<p class="error">${esc(e.message)}</p>`;
    setStatus("");
  }
}

async function analyze() {
  if (demoMode) {
    if (!selectedDemo) { setStatus("Pick a demo from the dropdown to replay."); return; }
    await replayDemo(selectedDemo);
    return;
  }

  const product = $("product").value.trim();
  const raw = $("feedback").value;
  if (!product) { setStatus("Enter a product name."); return; }
  if (!raw.trim()) { setStatus("Paste or upload some feedback first."); return; }

  $("analyze").disabled = true;
  $("report").innerHTML = "";
  try {
    // 1. Parse the raw input into individual comments (handles CSV / JSON / messy dumps).
    setStatus("Parsing your input…", true);
    const ir = await fetch("/api/ingest", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ product, raw, source: "pasted" })
    });
    if (!ir.ok) {
      const err = await ir.json().catch(() => ({}));
      throw new Error(err.detail || `Parse failed (HTTP ${ir.status})`);
    }
    const parsed = await ir.json();   // AnalyzeRequest { product, feedback: [items] }
    const n = (parsed.feedback || []).length;
    if (!n) throw new Error("No usable feedback found in that input.");

    // 2. Analyze the parsed comments.
    setStatus(`Parsed ${n} comment${n === 1 ? "" : "s"} — analyzing…`, true);
    const ar = await fetch("/api/analyze", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(parsed)
    });
    if (!ar.ok) {
      const err = await ar.json().catch(() => ({}));
      throw new Error(err.detail || `Analysis failed (HTTP ${ar.status})`);
    }
    const stored = await ar.json();
    await showReport(stored.id);
    await loadHistory();
  } catch (e) {
    $("report").innerHTML = `<p class="error">${esc(e.message)}</p>`;
    setStatus("");
  } finally {
    $("analyze").disabled = false;
  }
}

async function showReport(id) {
  setStatus("Loading report…", true);
  try {
    const r = await fetch(`/api/reports/${id}/view`);
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    render(await r.json(), id);
    setStatus(`Report #${id}`);
    window.scrollTo({ top: 0, behavior: "smooth" });
  } catch (e) {
    $("report").innerHTML = `<p class="error">${esc(e.message)}</p>`;
    setStatus("");
  }
}

function badge(cls, text) { return `<span class="badge ${cls}">${esc(text)}</span>`; }

function evidenceHtml(ev) {
  return (ev || []).map(e => {
    const bits = [];
    if (e.source) bits.push(esc(e.source));
    if (e.url) bits.push(`<a href="${esc(e.url)}" target="_blank" rel="noopener">link</a>`);
    const cite = bits.length ? ` <span class="cite">— ${bits.join(" · ")}</span>` : "";
    return `<li><span class="quote">“${esc(e.quote)}”</span>${cite}</li>`;
  }).join("");
}

function render(view, id) {
  lastView = view;
  const themes = view.themes || [];
  let html = `<div class="grid">
    <div class="card summary">
      <div class="sectiontitle" style="margin-top:0">Executive summary</div>
      <div><b>${esc(view.product)}</b> · ${themes.length} theme(s)${view.total_feedback ? ` · ${view.relevant_count} relevant of ${view.total_feedback} comments` : ""}</div>
      <p>${esc(view.summary)}</p>
      <div class="row">
        <button class="btn-link ghost" data-export="md">⬇ Markdown</button>
        <button class="btn-link ghost" data-export="json">⬇ JSON</button>
      </div>
    </div>`;

  if (!themes.length) {
    html += `<div class="card"><p class="hint">No themes found in this feedback.</p></div>`;
  }

  for (const t of themes) {
    html += `<div class="card theme ${esc(t.type)}">
      <h3>${esc(t.title)}</h3>
      <div class="badges">
        ${badge(t.type, t.type)}
        ${badge("sev-" + t.severity, t.severity + " severity")}
        ${badge("", esc(t.onboarding_stage))}
        ${badge("", (t.frequency ?? 0) + " mentions")}
      </div>
      <ul class="evidence">${evidenceHtml(t.evidence)}</ul>
      <div class="rec"><b>Recommendation:</b> ${esc(t.recommendation)}</div>
    </div>`;
  }

  if (themes.length) {
    html += `<div class="card">
      <div class="sectiontitle" style="margin-top:0">Prioritized findings</div>
      <table>
        <thead><tr><th>Theme</th><th>Type</th><th>Severity</th><th>Stage</th><th>Mentions</th><th>Recommendation</th></tr></thead>
        <tbody>
          ${themes.map(t => `<tr>
            <td>${esc(t.title)}</td>
            <td>${esc(t.type)}</td>
            <td>${esc(t.severity)}</td>
            <td>${esc(t.onboarding_stage)}</td>
            <td>${t.frequency ?? 0}</td>
            <td>${esc(t.recommendation)}</td>
          </tr>`).join("")}
        </tbody>
      </table>
    </div>`;
  }

  html += `</div>`;
  $("report").innerHTML = html;
}

async function loadHistory() {
  try {
    const r = await fetch("/api/reports");
    if (!r.ok) return;
    const list = await r.json();
    const el = $("history");
    if (!list.length) { el.innerHTML = ""; return; }
    el.innerHTML = `<div class="sectiontitle">Past reports</div>
      <div class="card"><table>
        <thead><tr><th>#</th><th>Product</th><th>Themes</th><th>Created (UTC)</th></tr></thead>
        <tbody>${list.map(s => `<tr class="histrow" data-id="${s.id}">
          <td>${s.id}</td>
          <td>${esc(s.product)}</td>
          <td>${(s.report.themes || []).length}</td>
          <td>${esc(s.created_at)}</td>
        </tr>`).join("")}</tbody>
      </table></div>`;
    el.querySelectorAll(".histrow").forEach(row =>
      row.addEventListener("click", () => showReport(row.dataset.id)));
  } catch (e) { /* history is non-critical */ }
}

// ---- client-side export (works for both live and demo runs) -------------------------
function buildMarkdown(v) {
  const sev = s => ({ high: "HIGH", medium: "MEDIUM", low: "LOW" }[s] || String(s).toUpperCase());
  const out = [`# Onboarding Report — ${v.product}`, ""];
  if (v.total_feedback) out.push(`_Analyzed ${v.relevant_count} relevant of ${v.total_feedback} submitted comments._`, "");
  out.push((v.summary || "").trim() || "_No summary._", "");
  const themes = v.themes || [];
  if (!themes.length) { out.push("_No themes found._"); return out.join("\n") + "\n"; }
  for (const t of themes) {
    out.push(`## ${t.title}`);
    out.push(`**${t.type} · ${sev(t.severity)}** · stage: ${t.onboarding_stage} · mentioned ${t.frequency}×`, "");
    out.push(`**Recommendation:** ${t.recommendation}`, "", "Evidence:");
    for (const ev of (t.evidence || [])) {
      const cite = [ev.source, ev.url ? `[link](${ev.url})` : null].filter(Boolean);
      out.push(`- > ${ev.quote}${cite.length ? " — " + cite.join(" · ") : ""}`);
    }
    out.push("");
  }
  return out.join("\n").replace(/\s+$/, "") + "\n";
}

function downloadFile(name, text, mime) {
  const url = URL.createObjectURL(new Blob([text], { type: mime }));
  const a = Object.assign(document.createElement("a"), { href: url, download: name });
  document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(url);
}

function exportReport(fmt) {
  if (!lastView) return;
  const slug = (lastView.product || "report").toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-|-$/g, "").slice(0, 40) || "report";
  if (fmt === "json") downloadFile(`friction-${slug}.json`, JSON.stringify(lastView, null, 2), "application/json");
  else downloadFile(`friction-${slug}.md`, buildMarkdown(lastView), "text/markdown");
}

function setDemoMode(on) {
  demoMode = on;
  $("analyze").textContent = on ? "Run demo" : "Analyze onboarding";
}

$("demo").addEventListener("change", (e) => loadSample(e.target.value));
$("analyze").addEventListener("click", analyze);
$("report").addEventListener("click", (e) => {
  const b = e.target.closest("[data-export]");
  if (b) exportReport(b.dataset.export);
});
$("file").addEventListener("change", async (e) => {
  const f = e.target.files[0];
  if (!f) return;
  setStatus(`Loading ${f.name}…`, true);
  try { $("feedback").value = await f.text(); setStatus(`Loaded ${f.name} — click Analyze.`); }
  catch { setStatus("Couldn't read that file."); }
});

if (STATIC) {
  // No backend: demo mode is the only path. Hide the live-only affordances.
  document.querySelector('label[for="feedback"]').textContent = "Pick a demo above to see a real analysis (no API key needed).";
  $("feedback").style.display = "none";
  $("uploadlabel").style.display = "none";
  setDemoMode(true);
} else {
  // Backend available: let the user choose live analysis vs. instant canned replay.
  $("demomodewrap").style.display = "";
  $("demomode").addEventListener("change", (e) => setDemoMode(e.target.checked));
  setDemoMode(false);
}

loadDemos();
if (!STATIC) loadHistory();
</script>
</body>
</html>
